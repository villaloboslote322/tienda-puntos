services:
  - type: web
    name: tienda-puntos-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm run build && npm run start
    rootDir: backend
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        fromDatabase:
          name: tienda-puntos-db
          property: connectionString
      - key: JWT_PRIVATE_KEY
        sync: false
      - key: JWT_PUBLIC_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        value: dummy
      - key: TWILIO_AUTH_TOKEN
        value: dummy
      - key: TWILIO_PHONE_NUMBER
        value: "+1234567890"

databases:
  - name: tienda-puntos-db
    plan: free
    region: oregon
